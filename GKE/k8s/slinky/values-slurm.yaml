# Slurm chart overrides for GPU + Pyxis
# Assumes A100 nodes are labeled with: cloud.google.com/gke-accelerator=nvidia-tesla-a100

configFiles:
  gres.conf: |
    AutoDetect=nvidia
  plugstack.conf: |
    include /usr/share/pyxis/*

loginsets:
  pyxis:
    enabled: true
    replicas: 1
    login:
      image:
        repository: ghcr.io/slinkyproject/login-pyxis
        tag: 25.11-ubuntu24.04
      securityContext:
        privileged: true
    podSpec:
      securityContext:
        fsGroup: 401
    sssdConf: |
      [sssd]
      config_file_version = 2
      services = nss,pam
      domains = LOCAL

      [nss]
      filter_groups = root,slurm
      filter_users = root,slurm

      [pam]

      [domain/LOCAL]
      id_provider = files
      auth_provider = files

nodesets:
  slinky:
    enabled: false
  gpu:
    enabled: true
    replicas: 2
    slurmd:
      image:
        repository: ghcr.io/slinkyproject/slurmd-pyxis
        tag: 25.11-ubuntu24.04
      resources:
        requests:
          cpu: "4"
          memory: 32Gi
          nvidia.com/gpu: 1
        limits:
          cpu: "8"
          memory: 64Gi
          nvidia.com/gpu: 1
    logfile:
      image:
        repository: docker.io/library/alpine
        tag: latest
      resources: {}
    useResourceLimits: true
    updateStrategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 25%
    taintKubeNodes: false
    podSpec:
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-tesla-a100
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
    partition:
      enabled: true
      configMap:
        State: UP
        Default: "YES"
        MaxTime: UNLIMITED
